<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 10px; }
        .cell { background: #333; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .cell:hover { background: #444; }
        .cell.x { color: #ff4444; }
        .cell.o { color: #4444ff; }
        #status { margin-bottom: 20px; font-size: 24px; }
        button { margin-top: 20px; padding: 10px 20px; background: #444; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status">Player X's Turn</div>
    <div class="grid" id="grid">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    <button onclick="reset()">Reset Game</button>
    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        const cells = document.querySelectorAll('.cell');
        const status = document.getElementById('status');

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.getAttribute('data-index');
                if (board[index] === '' && !checkWinner()) {
                    board[index] = currentPlayer;
                    cell.innerText = currentPlayer;
                    cell.classList.add(currentPlayer.toLowerCase());
                    if (checkWinner()) {
                        status.innerText = `Player ${currentPlayer} Wins!`;
                    } else if (board.every(c => c !== '')) {
                        status.innerText = "It's a Draw!";
                    } else {
                        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                        status.innerText = `Player ${currentPlayer}'s Turn`;
                    }
                }
            });
        });

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(w => board[w[0]] && board[w[0]] === board[w[1]] && board[w[0]] === board[w[2]]);
        }

        function reset() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            status.innerText = "Player X's Turn";
            cells.forEach(cell => {
                cell.innerText = '';
                cell.classList.remove('x', 'o');
            });
        }
    </script>
</body>
</html>
